[mgr]
# Give the preview pane more room; useful for PDF/image previews.
ratio = [1, 3, 5]

[preview]
# PDF previews go through the image preview cache, so larger bounds make rendered
# pages fill the preview pane better. Run `yazi --clear-cache` after changes.
max_width = 2400
max_height = 3600
image_quality = 90
image_filter = "lanczos3"
